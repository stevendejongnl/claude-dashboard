<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Transparency Dashboard</title>
  <script src="/static/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
      --purple:   #bc8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: 48px 1fr 1fr;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background-color: var(--border);
    }

    header {
      grid-column: 1 / -1;
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 15px; color: var(--accent); font-weight: 600; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #leak-badge {
      background: var(--red);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      animation: pulse-leak 1.5s infinite;
      font-weight: 600;
    }
    #leak-badge.hidden { display: none; }
    @keyframes pulse-leak { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #live-wire { grid-row: 2 / 4; grid-column: 1; }
    #telemetry { grid-row: 2; grid-column: 2; }
    #leaks { grid-row: 2; grid-column: 3; }
    #api-stats { grid-row: 3; grid-column: 2; }
    #sessions { grid-row: 3; grid-column: 3; }

    .panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* Live Wire rows */
    .flow-row {
      display: grid;
      grid-template-columns: 90px 60px 1fr 60px 70px;
      gap: 8px;
      padding: 3px 12px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      cursor: pointer;
      user-select: none;
    }
    .flow-row:hover { background: rgba(88,166,255,0.05); }
    .cat-messages_api  { color: var(--accent); }
    .cat-metrics       { color: var(--yellow); }
    .cat-statsig       { color: var(--purple); }
    .cat-anthropic_other { color: var(--green); }
    .status-ok  { color: var(--green); }
    .status-err { color: var(--red); }

    /* Telemetry Event rows */
    .evt-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 8px;
      padding: 3px 12px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      cursor: pointer;
      user-select: none;
    }
    .evt-name { color: var(--accent); }
    .evt-ts   { color: var(--muted); font-size: 11px; }

    /* Leaks rows */
    .leak-row {
      display: grid;
      grid-template-columns: 70px 1fr auto auto;
      gap: 6px;
      padding: 4px 8px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      cursor: pointer;
      user-select: none;
      align-items: center;
    }
    .leak-row:hover { background: rgba(88,166,255,0.03); }
    .leak-badge {
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .leak-badge.critical { background: rgba(248,81,73,0.2); color: var(--red); }
    .leak-badge.high { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .leak-badge.medium { background: rgba(88,166,255,0.2); color: var(--accent); }
    .leak-desc { color: var(--text); font-size: 12px; }
    .leak-redacted { color: var(--red); font-weight: 600; font-family: monospace; font-size: 11px; }

    .leak-empty {
      padding: 12px;
      text-align: center;
      color: var(--green);
      font-size: 12px;
    }

    /* Chart panel */
    #api-stats .panel-body { padding: 12px; position: relative; }

    /* Sessions table */
    .sessions-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sessions-table th {
      position: sticky;
      top: 0;
      background: var(--surface);
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 6px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .sessions-table td {
      padding: 4px 6px;
      border-bottom: 1px solid rgba(48,54,61,0.4);
      font-size: 11px;
    }

    /* Detail overlay */
    #detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #detail-overlay.open { display: flex; }
    #detail-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 80vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }
    #detail-box pre {
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      font-size: 11px;
      margin: 0;
    }
    #detail-close {
      float: right;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <div class="dot" id="ws-dot"></div>
  <h1>Claude Code Transparency</h1>
  <span id="ws-status" style="color:var(--muted);font-size:11px;">connecting...</span>
  <span id="leak-badge" class="hidden">⚠ <span id="leak-count">0</span> LEAKS</span>
  <a href="/api/cert" style="margin-left:auto;color:var(--accent);font-size:11px;text-decoration:none;border:1px solid var(--accent);padding:2px 6px;border-radius:3px;">
    Download CA Cert
  </a>
</header>

<!-- Panel 1: Live Wire -->
<div class="panel" id="live-wire">
  <div class="panel-header">
    <span>Live Wire</span>
    <span id="flow-count" style="color:var(--green)">0 flows</span>
  </div>
  <div class="panel-body" id="live-wire-body"></div>
</div>

<!-- Panel 2: Telemetry Events -->
<div class="panel" id="telemetry">
  <div class="panel-header">
    <span>Telemetry Events</span>
    <input id="evt-filter" type="text" placeholder="filter..."
      style="background:var(--bg);border:1px solid var(--border);color:var(--text);
             padding:2px 6px;font-size:10px;border-radius:3px;width:120px;">
  </div>
  <div class="panel-body" id="evt-panel"></div>
</div>

<!-- Panel 3: Leaks -->
<div class="panel" id="leaks">
  <div class="panel-header">
    <span>⚠ Leaks Detected</span>
    <span id="leaks-count" style="color:var(--red)">0</span>
  </div>
  <div class="panel-body" id="leaks-panel"></div>
</div>

<!-- Panel 4: API Stats -->
<div class="panel" id="api-stats">
  <div class="panel-header">
    <span>API Stats</span>
    <select id="chart-mode" style="background:var(--bg);border:1px solid var(--border);
            color:var(--text);font-size:10px;padding:2px 4px;border-radius:3px;">
      <option value="cost">Cost / day</option>
      <option value="tokens">Tokens / day</option>
    </select>
  </div>
  <div class="panel-body">
    <canvas id="stats-chart"></canvas>
  </div>
</div>

<!-- Panel 5: Sessions -->
<div class="panel" id="sessions">
  <div class="panel-header">
    <span>Sessions</span>
    <span id="total-cost" style="color:var(--yellow)">$0.00 total</span>
  </div>
  <div class="panel-body">
    <table class="sessions-table">
      <thead>
        <tr>
          <th>ID</th><th>End</th><th>Cost</th>
          <th>In</th><th>Out</th><th>+</th><th>-</th>
        </tr>
      </thead>
      <tbody id="sessions-body"></tbody>
    </table>
  </div>
</div>

<!-- Detail overlay -->
<div id="detail-overlay">
  <div id="detail-box">
    <span id="detail-close">✕</span>
    <pre id="detail-content"></pre>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
